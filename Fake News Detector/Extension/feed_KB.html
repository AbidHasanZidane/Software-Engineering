<!DOCTYPE html>
<html>
<head>
    <title>Feed Knowledge Base</title>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 800px; margin: auto; }
        textarea { width: 100%; height: 150px; margin: 10px 0; }
        button { background: #007bff; color: white; padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 4px; overflow-x: auto; }
    </style>
</head>
<body>
    <h2>📚 Feed Knowledge Base</h2>
    <p>Paste trusted text (news, facts, articles) – the system will extract all triplets and store them.</p>
    <textarea id="textInput" placeholder="Example: Albert Einstein developed the theory of relativity. The Earth orbits the Sun."></textarea>
    <button onclick="addText()">Add to KB</button>
    <h3>Response:</h3>
    <pre id="output">Waiting...</pre>

    <script>
        async function addText() {
            const text = document.getElementById('textInput').value;
            if (!text.trim()) {
                alert('Please enter some text.');
                return;
            }
            document.getElementById('output').innerText = 'Sending...';
            try {
                const response = await fetch('http://localhost:5000/add_text', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });
                const data = await response.json();
                document.getElementById('output').innerText = JSON.stringify(data, null, 2);
            } catch (err) {
                document.getElementById('output').innerText = 'Error: ' + err.message;
            }
        }
    </script>
</body>
</html>
